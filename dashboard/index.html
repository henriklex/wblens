<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Whiteboard Lens — Dashboard</title>
<style>
  :root {
    --bg: #0a0a12;
    --surface: #13131f;
    --surface2: #1a1a2a;
    --border: #2a2a3a;
    --orange: #FF9A32;
    --orange-dim: rgba(255, 154, 50, 0.15);
    --text: #e8e8f0;
    --muted: #888899;
    --green: #4ade80;
    --red: #f87171;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    font-size: 14px;
    line-height: 1.5;
    min-height: 100vh;
  }

  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 20px 32px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
  }

  .header-left {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .logo-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: var(--orange);
  }

  h1 {
    font-size: 16px;
    font-weight: 600;
    letter-spacing: 0.02em;
    color: var(--text);
  }

  .updated {
    font-size: 12px;
    color: var(--muted);
  }

  .period-toggle {
    display: flex;
    gap: 0;
    border: 1px solid var(--border);
    border-radius: 6px;
    overflow: hidden;
  }

  .period-toggle button {
    background: transparent;
    border: none;
    color: var(--muted);
    padding: 6px 14px;
    cursor: pointer;
    font-size: 13px;
    transition: background 0.15s, color 0.15s;
  }

  .period-toggle button.active {
    background: var(--orange-dim);
    color: var(--orange);
  }

  .period-toggle button:first-child {
    border-right: 1px solid var(--border);
  }

  main {
    max-width: 900px;
    margin: 0 auto;
    padding: 32px 24px;
    display: flex;
    flex-direction: column;
    gap: 32px;
  }

  section {
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .section-title {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
  }

  /* Stat cards */
  .stat-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 12px;
  }

  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px;
  }

  .stat-label {
    font-size: 11px;
    color: var(--muted);
    margin-bottom: 6px;
    letter-spacing: 0.04em;
  }

  .stat-value {
    font-size: 28px;
    font-weight: 600;
    letter-spacing: -0.02em;
    color: var(--text);
    line-height: 1;
  }

  .stat-value.null-val { color: var(--border); }

  /* Source bar */
  .source-bar-wrap {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px 20px;
  }

  .source-bar-label {
    font-size: 11px;
    color: var(--muted);
    margin-bottom: 10px;
  }

  .source-bar-track {
    height: 8px;
    background: var(--border);
    border-radius: 4px;
    overflow: hidden;
    display: flex;
  }

  .source-bar-segment {
    height: 100%;
    transition: width 0.4s ease;
  }

  .source-bar-segment.asa { background: var(--orange); }
  .source-bar-segment.organic { background: #7c83fd; }
  .source-bar-segment.web { background: #4ade80; }

  .source-legend {
    display: flex;
    gap: 16px;
    margin-top: 10px;
  }

  .source-legend-item {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    color: var(--muted);
  }

  .source-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  /* Table */
  .table-wrap {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
  }

  table {
    width: 100%;
    border-collapse: collapse;
  }

  th {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--muted);
    padding: 12px 16px;
    text-align: left;
    border-bottom: 1px solid var(--border);
    background: var(--surface2);
  }

  td {
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
    color: var(--text);
  }

  tr:last-child td { border-bottom: none; }

  .empty-row td {
    text-align: center;
    color: var(--muted);
    padding: 24px;
  }

  /* Product health */
  .health-grid {
    display: grid;
    grid-template-columns: 1fr 2fr;
    gap: 12px;
  }

  .rating-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 20px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 6px;
    text-align: center;
  }

  .stars {
    font-size: 22px;
    letter-spacing: 2px;
    color: var(--orange);
  }

  .rating-num {
    font-size: 32px;
    font-weight: 700;
    color: var(--text);
    line-height: 1;
  }

  .review-count {
    font-size: 12px;
    color: var(--muted);
  }

  .delta {
    font-size: 12px;
    font-weight: 600;
  }
  .delta.up { color: var(--green); }
  .delta.same { color: var(--muted); }

  .reviews-list {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
  }

  .review-item {
    padding: 14px 16px;
    border-bottom: 1px solid var(--border);
  }

  .review-item:last-child { border-bottom: none; }

  .review-meta {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 4px;
  }

  .review-stars { color: var(--orange); font-size: 12px; }
  .review-author { font-size: 12px; color: var(--muted); }

  .review-title {
    font-size: 13px;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 2px;
  }

  .review-body {
    font-size: 12px;
    color: var(--muted);
    line-height: 1.4;
  }

  /* Reddit */
  .reddit-list {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
  }

  .reddit-row {
    display: grid;
    grid-template-columns: 120px 1fr 80px;
    align-items: center;
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
    gap: 12px;
  }

  .reddit-row:last-child { border-bottom: none; }

  .reddit-sub {
    font-size: 12px;
    font-weight: 600;
    color: var(--orange);
  }

  .reddit-title {
    font-size: 13px;
    color: var(--text);
  }

  .reddit-title a {
    color: inherit;
    text-decoration: none;
  }

  .reddit-title a:hover { color: var(--orange); }

  .reddit-score {
    text-align: right;
    font-size: 18px;
    font-weight: 700;
    color: var(--text);
  }

  .reddit-score.null-val {
    font-size: 14px;
    font-weight: 400;
    color: var(--border);
  }

  .score-label {
    font-size: 10px;
    color: var(--muted);
    text-align: right;
  }

  /* ASA not configured */
  .not-configured {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 24px;
    text-align: center;
    color: var(--muted);
    font-size: 13px;
  }

  /* Error / loading */
  #error-banner {
    display: none;
    background: rgba(248, 113, 113, 0.1);
    border: 1px solid rgba(248, 113, 113, 0.3);
    border-radius: 8px;
    padding: 12px 16px;
    color: var(--red);
    font-size: 13px;
    margin: 0 24px;
  }

  @media (max-width: 640px) {
    .stat-grid { grid-template-columns: repeat(2, 1fr); }
    .health-grid { grid-template-columns: 1fr; }
    header { padding: 16px; flex-wrap: wrap; gap: 12px; }
    main { padding: 20px 16px; }
    .reddit-row { grid-template-columns: 100px 1fr 60px; }
  }
</style>
</head>
<body>

<header>
  <div class="header-left">
    <div class="logo-dot"></div>
    <h1>Whiteboard Lens — Marketing Dashboard</h1>
  </div>
  <div style="display:flex;align-items:center;gap:16px">
    <span class="updated" id="updated-label">Loading…</span>
    <div class="period-toggle">
      <button id="btn-7d" class="active" onclick="setPeriod('7d')">7d</button>
      <button id="btn-30d" onclick="setPeriod('30d')">30d</button>
    </div>
  </div>
</header>

<div id="error-banner"></div>

<main>

  <!-- ACQUISITION -->
  <section>
    <div class="section-title">Acquisition</div>
    <div class="stat-grid">
      <div class="stat-card">
        <div class="stat-label">Downloads</div>
        <div class="stat-value" id="acq-downloads">—</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Impressions</div>
        <div class="stat-value" id="acq-impressions">—</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Page Views</div>
        <div class="stat-value" id="acq-pageviews">—</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Conversion</div>
        <div class="stat-value" id="acq-conversion">—</div>
      </div>
    </div>
    <div class="source-bar-wrap">
      <div class="source-bar-label">Download sources</div>
      <div class="source-bar-track" id="source-bar">
        <div class="source-bar-segment asa" id="bar-asa" style="width:0%"></div>
        <div class="source-bar-segment organic" id="bar-organic" style="width:0%"></div>
        <div class="source-bar-segment web" id="bar-web" style="width:0%"></div>
      </div>
      <div class="source-legend">
        <div class="source-legend-item">
          <div class="source-dot" style="background:#FF9A32"></div>
          <span id="legend-asa">ASA —</span>
        </div>
        <div class="source-legend-item">
          <div class="source-dot" style="background:#7c83fd"></div>
          <span id="legend-organic">Organic —</span>
        </div>
        <div class="source-legend-item">
          <div class="source-dot" style="background:#4ade80"></div>
          <span id="legend-web">Web —</span>
        </div>
      </div>
    </div>
  </section>

  <!-- APPLE SEARCH ADS -->
  <section>
    <div class="section-title">Apple Search Ads</div>
    <div id="asa-section"></div>
  </section>

  <!-- PRODUCT HEALTH -->
  <section>
    <div class="section-title">Product Health</div>
    <div class="health-grid">
      <div class="rating-card">
        <div class="stars" id="rating-stars">★★★★★</div>
        <div class="rating-num" id="rating-num">—</div>
        <div class="review-count" id="review-count">— reviews</div>
        <div class="delta same" id="review-delta"></div>
      </div>
      <div class="reviews-list" id="reviews-list">
        <div style="padding:24px;text-align:center;color:var(--muted);font-size:13px">No reviews yet</div>
      </div>
    </div>
  </section>

  <!-- REDDIT -->
  <section>
    <div class="section-title">Reddit — Comment Scores</div>
    <div class="reddit-list" id="reddit-list"></div>
  </section>

</main>

<script>
  let data = null;
  let period = '7d';

  function fmt(n) {
    if (n === null || n === undefined) return '—';
    if (n >= 1000) return (n / 1000).toFixed(1) + 'k';
    return String(n);
  }

  function fmtPct(n) {
    if (n === null || n === undefined) return '—';
    return n.toFixed(1) + '%';
  }

  function fmtMoney(n) {
    if (n === null || n === undefined) return '—';
    return '$' + n.toFixed(2);
  }

  function starsHtml(rating) {
    if (rating === null) return '☆☆☆☆☆';
    const full = Math.round(rating);
    return '★'.repeat(full) + '☆'.repeat(5 - full);
  }

  function setPeriod(p) {
    period = p;
    document.getElementById('btn-7d').className = p === '7d' ? 'active' : '';
    document.getElementById('btn-30d').className = p === '30d' ? 'active' : '';
    if (data) render();
  }

  function render() {
    const acq = data.acquisition[period];
    const asa = data.asa[period];
    const health = data.productHealth;

    // Acquisition stats
    document.getElementById('acq-downloads').textContent = fmt(acq.downloads);
    document.getElementById('acq-impressions').textContent = fmt(acq.impressions);
    document.getElementById('acq-pageviews').textContent = fmt(acq.pageViews);
    document.getElementById('acq-conversion').textContent = fmtPct(acq.conversionRate);

    // Source bar
    const src = acq.sources;
    const total = (src.asa || 0) + (src.organic || 0) + (src.web || 0);
    if (total > 0) {
      document.getElementById('bar-asa').style.width = ((src.asa || 0) / total * 100) + '%';
      document.getElementById('bar-organic').style.width = ((src.organic || 0) / total * 100) + '%';
      document.getElementById('bar-web').style.width = ((src.web || 0) / total * 100) + '%';
    }
    document.getElementById('legend-asa').textContent = 'ASA ' + (src.asa !== null ? src.asa : '—');
    document.getElementById('legend-organic').textContent = 'Organic ' + (src.organic !== null ? src.organic : '—');
    document.getElementById('legend-web').textContent = 'Web ' + (src.web !== null ? src.web : '—');

    // ASA section
    const asaEl = document.getElementById('asa-section');
    if (asa.totalSpend === null && asa.keywords.length === 0) {
      asaEl.innerHTML = '<div class="not-configured">Apple Search Ads not configured yet — add <code>ASA_KEY</code> secret to enable</div>';
    } else {
      const kwRows = asa.keywords.map(k => `
        <tr>
          <td>${k.keyword}</td>
          <td>${fmtMoney(k.spend)}</td>
          <td>${fmt(k.taps)}</td>
          <td>${fmt(k.installs)}</td>
          <td>${k.cpa !== null ? fmtMoney(k.cpa) : '—'}</td>
          <td>${k.ttr !== null ? fmtPct(k.ttr) : '—'}</td>
        </tr>
      `).join('');
      asaEl.innerHTML = `
        <div class="stat-card" style="display:inline-block;margin-bottom:12px">
          <div class="stat-label">Total spend (${period})</div>
          <div class="stat-value">${fmtMoney(asa.totalSpend)}</div>
        </div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Keyword</th>
                <th>Spend</th>
                <th>Taps</th>
                <th>Installs</th>
                <th>CPA</th>
                <th>TTR</th>
              </tr>
            </thead>
            <tbody>${kwRows || '<tr class="empty-row"><td colspan="6">No keyword data</td></tr>'}</tbody>
          </table>
        </div>
      `;
    }

    // Product health
    document.getElementById('rating-stars').textContent = starsHtml(health.rating);
    document.getElementById('rating-num').textContent = health.rating !== null ? health.rating.toFixed(1) : '—';
    document.getElementById('review-count').textContent = health.reviewCount !== null ? health.reviewCount + ' reviews' : '— reviews';

    if (health.prevWeekReviewCount !== null && health.reviewCount !== null) {
      const delta = health.reviewCount - health.prevWeekReviewCount;
      const el = document.getElementById('review-delta');
      if (delta > 0) { el.textContent = '+' + delta + ' this week'; el.className = 'delta up'; }
      else if (delta === 0) { el.textContent = 'No new reviews'; el.className = 'delta same'; }
    }

    const reviewsEl = document.getElementById('reviews-list');
    if (health.latestReviews && health.latestReviews.length > 0) {
      reviewsEl.innerHTML = health.latestReviews.map(r => `
        <div class="review-item">
          <div class="review-meta">
            <span class="review-stars">${'★'.repeat(r.rating)}${'☆'.repeat(5 - r.rating)}</span>
            <span class="review-author">${r.author || 'Anonymous'}</span>
          </div>
          ${r.title ? `<div class="review-title">${r.title}</div>` : ''}
          ${r.body ? `<div class="review-body">${r.body}</div>` : ''}
        </div>
      `).join('');
    } else {
      reviewsEl.innerHTML = '<div style="padding:24px;text-align:center;color:var(--muted);font-size:13px">No reviews yet</div>';
    }

    // Reddit
    const redditEl = document.getElementById('reddit-list');
    redditEl.innerHTML = (data.reddit || []).map(t => `
      <div class="reddit-row">
        <div class="reddit-sub">${t.subreddit}</div>
        <div class="reddit-title"><a href="${t.url}" target="_blank">${t.title}</a></div>
        <div>
          <div class="reddit-score ${t.score === null ? 'null-val' : ''}">${t.score !== null ? t.score : '—'}</div>
          <div class="score-label">score</div>
        </div>
      </div>
    `).join('');
  }

  async function load() {
    try {
      const res = await fetch('./dashboard-data.json?' + Date.now());
      if (!res.ok) throw new Error('HTTP ' + res.status);
      data = await res.json();

      const updEl = document.getElementById('updated-label');
      if (data.updated) {
        const d = new Date(data.updated);
        updEl.textContent = 'Updated ' + d.toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' });
      } else {
        updEl.textContent = 'No data yet — run workflow to populate';
      }

      render();
    } catch (e) {
      document.getElementById('updated-label').textContent = 'Error loading data';
      const banner = document.getElementById('error-banner');
      banner.style.display = 'block';
      banner.textContent = 'Failed to load dashboard-data.json: ' + e.message;
    }
  }

  load();
</script>
</body>
</html>
